<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Staticmap Playground</title>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7.3/turf.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f2ea;
        --panel: #ffffff;
        --ink: #1f1f1f;
        --muted: #6b6b6b;
        --accent: #2367f1;
        --accent-2: #f26d5b;
        --border: #e4ddd2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at top left,
            rgba(35, 103, 241, 0.12),
            transparent 45%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(242, 109, 91, 0.12),
            transparent 45%
          ),
          var(--bg);
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        padding: 12px 24px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .header-row1 {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: -0.02em;
      }

      p {
        margin: 2px 0 0;
        font-size: 12px;
        color: var(--muted);

        a {
          color: var(--muted);
        }
      }

      .header-buttons {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .header-url {
        padding: 8px 12px;
        background: #f4f1ea;
        border-radius: 8px;
        font-size: 12px;
        word-break: break-all;
        color: #3c3c3c;
        cursor: text;
        user-select: all;
      }

      .header-error {
        color: #c0392b;
        font-weight: 600;
        font-size: 13px;
      }

      main {
        max-width: 1100px;
        margin: 24px auto 48px;
        padding: 0 24px;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 24px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
      }

      .panel h2 {
        margin: 0 0 16px;
        font-size: 18px;
      }

      label {
        display: block;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 8px;
      }

      input,
      textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 12px 14px;
        font-size: 14px;
        font-family: "Space Grotesk", sans-serif;
        background: #fcfbf9;
      }

      textarea {
        min-height: 180px;
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: 160px minmax(0, 1fr);
        gap: 16px;
        margin-bottom: 16px;
      }

      .row.full {
        grid-template-columns: minmax(0, 1fr);
      }

      .list {
        display: grid;
        gap: 12px;
        margin-bottom: 16px;
      }

      .list-item {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: #fcfbf9;
      }

      .list-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: #f1ede4;
        font-size: 12px;
        font-weight: 600;
      }

      .item-actions {
        display: flex;
        gap: 8px;
      }

      .small {
        padding: 6px 12px;
        font-size: 12px;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 12px 20px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        background: var(--accent);
        color: white;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }

      button.secondary {
        background: #f1ede4;
        color: var(--ink);
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(35, 103, 241, 0.25);
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .preview {
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .preview img {
        display: block;
      }

      .preview.dirty #preview-grid {
        opacity: 0.4;
        transition: opacity 0.2s ease;
      }

      .pages-grid {
        display: inline-grid;
        gap: 25px;
      }

      .pages-grid img {
        display: block;
      }

      .row.narrow {
        grid-template-columns: 160px;
      }

      .pages-mode-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        text-transform: none;
        letter-spacing: 0;
        color: var(--ink);
        margin: 0;
      }

      .pages-mode-checkbox {
        width: auto;
        border: none;
        padding: 0;
        background: none;
      }

      .pill-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .geojsonio-link {
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
      }

      .geo-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }

      .geo-header > label {
        margin: 0;
      }

      .precision-wrap {
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 13px;
        color: var(--muted);
      }

      .precision-wrap label {
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 11px;
      }

      .precision-input {
        width: 56px;
        padding: 4px 8px;
        font-size: 13px;
      }

      .simplify-input {
        width: 72px;
        padding: 4px 8px;
        font-size: 13px;
      }

      .tile-footer {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-top: 4px;
      }

      .tile-coord {
        font-size: 11px;
        color: var(--muted);
      }

      .tile-attribution {
        font-size: 11px;
        color: var(--muted);
        margin-left: auto;
      }

      .tile-attribution a {
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <form id="state-form">
      <header>
        <input type="hidden" name="itemCount" id="item-count" value="0" />
        <div class="header-row1">
          <div>
            <h1>Staticmap Playground</h1>
            <p>
              <a href="https://github.com/dzfranklin/staticmap"
                >github.com/dzfranklin/staticmap</a
              >
            </p>
          </div>
          <div class="header-buttons">
            <button id="preview" type="button">Preview</button>
            <button id="reset" class="secondary" type="button">Reset</button>
            <label class="pages-mode-label">
              <input
                type="checkbox"
                id="pages-mode"
                name="pages"
                value="1"
                class="pages-mode-checkbox"
              />
              Pages mode
            </label>
            <span id="error" class="header-error"></span>
          </div>
        </div>
        <span id="url" class="header-url"></span>
      </header>
      <main>
        <section class="panel">
          <h2>Inputs</h2>
          <div>
            <div class="row narrow">
              <div>
                <label for="source">Source Key</label>
                <input id="source" name="source" value="osm" />
              </div>
            </div>
            <div class="list" id="command-list"></div>
            <div class="actions">
              <button id="add-text" class="secondary small" type="button">
                Add command
              </button>
              <button id="add-geojson" class="secondary small" type="button">
                Add line
              </button>
              <button id="add-point" class="secondary small" type="button">
                Add point
              </button>
            </div>
          </div>
        </section>
        <section class="panel preview">
          <h2>Preview</h2>
          <div id="preview-grid" class="pages-grid"></div>
        </section>
      </main>
    </form>
    <script>
      const form = document.getElementById("state-form");
      const itemCountInput = document.getElementById("item-count");
      const commandList = document.getElementById("command-list");
      const urlBox = document.getElementById("url");
      const errorBox = document.getElementById("error");
      const previewButton = document.getElementById("preview");
      const addTextButton = document.getElementById("add-text");
      const addGeoButton = document.getElementById("add-geojson");
      const addPointButton = document.getElementById("add-point");
      const pagesModeCheckbox = document.getElementById("pages-mode");
      const previewSection = document.querySelector("section.preview");
      const previewGrid = document.getElementById("preview-grid");

      const defaultTextCommand =
        "size:600x300/padding:16/color:#0000ff/width:10/border:#ffffff/borderWidth:6";
      const defaultLine =
        '{"type":"Feature","properties":{},"geometry":{"type":"LineString","coordinates":[[-3.7433,57.13575],[-3.74283,57.13553],[-3.74238,57.13515],[-3.74218,57.13479],[-3.74214,57.13463],[-3.74203,57.13453],[-3.74203,57.1344],[-3.74189,57.13432],[-3.74184,57.1342],[-3.74155,57.134],[-3.74143,57.13376],[-3.74131,57.13372],[-3.74097,57.13334],[-3.74001,57.13264],[-3.73827,57.13165],[-3.737,57.13088],[-3.73603,57.13047],[-3.73539,57.13033],[-3.73382,57.12941],[-3.73305,57.1286],[-3.73259,57.1279],[-3.73208,57.12762],[-3.73205,57.12749],[-3.73002,57.12632],[-3.72977,57.126],[-3.72914,57.12586],[-3.72776,57.125]]}}';
      const defaultPoint =
        '{"type":"Feature","properties":{},"geometry":{"coordinates":[-3.73539,57.13033],"type":"Point"}}';

      // polyline encoding

      function encodePolyline(coords, precision) {
        let lastLat = 0;
        let lastLng = 0;
        const factor = Math.pow(10, precision || 5);
        let result = "";

        for (const [lng, lat] of coords) {
          const ilat = Math.round(lat * factor);
          const ilng = Math.round(lng * factor);
          result += encodeSigned(ilat - lastLat);
          result += encodeSigned(ilng - lastLng);
          lastLat = ilat;
          lastLng = ilng;
        }

        return result;
      }

      function encodeSigned(value) {
        let sgnNum = value << 1;
        if (value < 0) {
          sgnNum = ~sgnNum;
        }
        return encodeUnsigned(sgnNum);
      }

      function encodeUnsigned(value) {
        let encoded = "";
        while (value >= 0x20) {
          encoded += String.fromCharCode((0x20 | (value & 0x1f)) + 63);
          value >>= 5;
        }
        encoded += String.fromCharCode(value + 63);
        return encoded;
      }

      // Returns an array of URL path segment strings, e.g. "point:1,2" or "line:encoded"
      function geojsonToCommands(geojson, precision) {
        if (!geojson) return [];

        if (Array.isArray(geojson) && Array.isArray(geojson[0])) {
          const encoded = encodePolyline(geojson, precision);
          const prefix = precision !== 5 ? `${precision}:` : "";
          return [`line:${prefix}${encodeURIComponent(encoded)}`];
        }

        if (!geojson.type) return [];

        if (geojson.type === "Point") {
          const [lng, lat] = geojson.coordinates;
          const factor = Math.pow(10, precision);
          const rLng = Math.round(lng * factor) / factor;
          const rLat = Math.round(lat * factor) / factor;
          return [`point:${rLng},${rLat}`];
        }

        if (geojson.type === "LineString") {
          const encoded = encodePolyline(geojson.coordinates, precision);
          const prefix = precision !== 5 ? `${precision}:` : "";
          return [`line:${prefix}${encodeURIComponent(encoded)}`];
        }

        if (geojson.type === "MultiLineString") {
          return (geojson.coordinates ?? []).map((coords) => {
            const encoded = encodePolyline(coords, precision);
            const prefix = precision !== 5 ? `${precision}:` : "";
            return `line:${prefix}${encodeURIComponent(encoded)}`;
          });
        }

        if (geojson.type === "Feature") {
          return geojsonToCommands(geojson.geometry, precision);
        }

        if (geojson.type === "FeatureCollection") {
          return geojson.features.flatMap((f) =>
            geojsonToCommands(f, precision),
          );
        }

        return [];
      }

      // item DOM helpers

      function itemNodes() {
        return Array.from(commandList.children);
      }

      function readItems() {
        return itemNodes().map((node) => {
          const f = (name) =>
            node.querySelector(`[data-field="${name}"]`)?.value ?? "";
          const type = node.dataset.type;
          if (type === "text") {
            return { type, value: f("value") };
          } else {
            const precision = parseInt(f("precision"), 10);
            const toleranceRaw = parseFloat(f("tolerance"));
            return {
              type,
              value: f("value"),
              precision: Number.isFinite(precision) ? precision : 5,
              tolerance:
                Number.isFinite(toleranceRaw) && toleranceRaw > 0
                  ? toleranceRaw
                  : null,
            };
          }
        });
      }

      function setItemNames(node, index) {
        node.querySelectorAll("[data-field]").forEach((el) => {
          el.name = `item${index}_${el.dataset.field}`;
        });
        // the hidden type input uses data-field="type"
      }

      function removeItem(node) {
        node.remove();
        itemNodes().forEach((n, i) => setItemNames(n, i));
        itemCountInput.value = itemNodes().length;
        update();
      }

      function buildItemNode(type, defaults = {}) {
        const wrapper = document.createElement("div");
        wrapper.className = "list-item";
        wrapper.dataset.type = type;

        const header = document.createElement("div");
        header.className = "list-header";

        const pillGroup = document.createElement("div");
        pillGroup.className = "pill-group";

        const pill = document.createElement("span");
        pill.className = "pill";
        pill.textContent = type === "text" ? "Commands" : "GeoJSON";
        pillGroup.appendChild(pill);

        if (type === "geojson") {
          const link = document.createElement("a");
          link.textContent = "geojson.io";
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.dataset.geojsonio = "";
          link.className = "geojsonio-link";
          pillGroup.appendChild(link);
        }

        const actions = document.createElement("div");
        actions.className = "item-actions";

        const removeButton = document.createElement("button");
        removeButton.className = "secondary small";
        removeButton.type = "button";
        removeButton.textContent = "Remove";
        removeButton.addEventListener("click", () => removeItem(wrapper));

        actions.appendChild(removeButton);
        header.appendChild(pillGroup);
        header.appendChild(actions);
        wrapper.appendChild(header);

        const typeInput = document.createElement("input");
        typeInput.type = "hidden";
        typeInput.dataset.field = "type";
        typeInput.value = type;
        wrapper.appendChild(typeInput);

        if (type === "text") {
          const input = document.createElement("input");
          input.dataset.field = "value";
          input.value = defaults.value ?? "";
          input.placeholder = "color:#ffffff/width:6";
          wrapper.appendChild(input);
        } else {
          const geoHeader = document.createElement("div");
          geoHeader.className = "geo-header";

          const geoLabel = document.createElement("label");
          geoLabel.textContent = "GeoJSON";
          geoHeader.appendChild(geoLabel);

          const precisionWrap = document.createElement("div");
          precisionWrap.className = "precision-wrap";

          const precisionLabel = document.createElement("label");
          precisionLabel.textContent = "Precision";

          const precisionInput = document.createElement("input");
          precisionInput.type = "number";
          precisionInput.min = "1";
          precisionInput.max = "8";
          precisionInput.step = "1";
          precisionInput.dataset.field = "precision";
          precisionInput.value = defaults.precision ?? 5;
          precisionInput.className = "precision-input";

          precisionWrap.appendChild(precisionLabel);
          precisionWrap.appendChild(precisionInput);

          const simplifyLabel = document.createElement("label");
          simplifyLabel.textContent = "Simplify lines (digits)";

          const simplifyInput = document.createElement("input");
          simplifyInput.type = "number";
          simplifyInput.min = "0";
          simplifyInput.step = "1";
          simplifyInput.placeholder = "off";
          simplifyInput.dataset.field = "tolerance";
          simplifyInput.value = defaults.tolerance ?? "";
          simplifyInput.className = "simplify-input";

          precisionWrap.appendChild(simplifyLabel);
          precisionWrap.appendChild(simplifyInput);
          geoHeader.appendChild(precisionWrap);
          wrapper.appendChild(geoHeader);

          const textarea = document.createElement("textarea");
          textarea.spellcheck = false;
          textarea.dataset.field = "value";
          textarea.value = defaults.value ?? "";
          textarea.placeholder =
            '{"type":"Feature","geometry":{"type":"Point","coordinates":[-122.4,37.77]},"properties":{"label":"A"}}';
          wrapper.appendChild(textarea);
        }

        return wrapper;
      }

      function appendItem(type, defaults = {}) {
        const node = buildItemNode(type, defaults);
        commandList.appendChild(node);
        const index = itemNodes().length - 1;
        setItemNames(node, index);
        itemCountInput.value = itemNodes().length;
        refresh();
      }

      // hash state

      function refresh() {
        updateUrlBox();
        updateGeoJsonIoLinks();
      }

      function update() {
        const params = new URLSearchParams(new FormData(form));
        history.replaceState(null, "", "#" + params.toString());
        previewSection.classList.add("dirty");
        refresh();
      }

      function updateGeoJsonIoLinks() {
        for (const node of itemNodes()) {
          if (node.dataset.type !== "geojson") continue;
          const link = node.querySelector("a[data-geojsonio]");
          const raw = node.querySelector('[data-field="value"]')?.value.trim();
          link.href = raw
            ? "http://geojson.io/#data=data:application/json," +
              encodeURIComponent(raw)
            : "http://geojson.io/";
        }
      }

      function loadFromHash() {
        const hash = location.hash.slice(1);
        if (!hash) return false;

        const params = new URLSearchParams(hash);
        const source = params.get("source");
        if (source !== null) {
          document.getElementById("source").value = source;
        }

        pagesModeCheckbox.checked = params.get("pages") === "1";

        const count = parseInt(params.get("itemCount") ?? "0", 10);
        commandList.innerHTML = "";
        itemCountInput.value = 0;
        for (let i = 0; i < count; i++) {
          const type = params.get(`item${i}_type`);
          if (type === "text") {
            appendItem("text", { value: params.get(`item${i}_value`) ?? "" });
          } else if (type === "geojson") {
            const precision = parseInt(
              params.get(`item${i}_precision`) ?? "5",
              10,
            );
            const toleranceRaw = parseFloat(
              params.get(`item${i}_tolerance`) ?? "",
            );
            appendItem("geojson", {
              value: params.get(`item${i}_value`) ?? "",
              precision: Number.isFinite(precision) ? precision : 5,
              tolerance:
                Number.isFinite(toleranceRaw) && toleranceRaw > 0
                  ? toleranceRaw
                  : null,
            });
          }
        }

        return count > 0 || source !== null;
      }

      // map URL builder

      function buildMapUrl() {
        const source = document.getElementById("source").value.trim();
        if (!source) throw new Error("Source key is required.");

        const segments = [`map:${source}`];

        const items = readItems();
        if (items.length === 0)
          throw new Error("Add at least one command item.");

        for (const item of items) {
          if (item.type === "text") {
            const value = item.value.trim();
            if (!value) continue;
            segments.push(
              ...value
                .replace(/\#/g, "%23")
                .split("/")
                .map((p) => p.trim())
                .filter(Boolean),
            );
          } else {
            const geojsonRaw = item.value.trim();
            if (!geojsonRaw) throw new Error("GeoJSON item cannot be empty.");

            let geojson;
            try {
              geojson = JSON.parse(geojsonRaw);
            } catch {
              throw new Error("GeoJSON must be valid JSON.");
            }

            if (item.tolerance) {
              geojson = turf.simplify(geojson, {
                tolerance: Math.pow(10, -item.tolerance),
                highQuality: false,
              });
            }

            const precision = item.precision ?? 5;
            segments.push(...geojsonToCommands(geojson, precision));
          }
        }

        const mapPath = `/${segments.join("/")}`;
        return pagesModeCheckbox.checked ? `/pages${mapPath}` : mapPath;
      }

      function updateUrlBox() {
        try {
          urlBox.textContent = buildMapUrl();
          errorBox.textContent = "";
        } catch (e) {
          urlBox.textContent = "";
          errorBox.textContent = e.message || "Invalid input.";
        }
      }

      // preview

      const objectUrls = [];

      function resetPreview() {
        previewGrid.innerHTML = "";
        for (const u of objectUrls) URL.revokeObjectURL(u);
        objectUrls.length = 0;
      }

      async function renderTile(src, coord) {
        const response = await fetch(src);
        const blob = await response.blob();
        const attribution = response.headers.get("X-Map-Attribution");

        const objectUrl = URL.createObjectURL(blob);
        objectUrls.push(objectUrl);

        const img = document.createElement("img");
        img.alt = "";
        img.onload = () => {
          const w = img.naturalWidth / 2 + "px";
          img.style.width = w;
          img.style.height = img.naturalHeight / 2 + "px";
          div.style.width = w;
        };
        img.addEventListener("dragstart", (e) => {
          // Use actual tile so that I can drag it at actual size to see how it aligns with other tiles
          e.dataTransfer.setDragImage(img, 0, 0);
        });
        img.src = objectUrl;

        const div = document.createElement("div");
        div.appendChild(img);
        if (coord || attribution) {
          const footer = document.createElement("div");
          footer.className = "tile-footer";
          if (coord) {
            const coordEl = document.createElement("span");
            coordEl.textContent = coord;
            coordEl.className = "tile-coord";
            footer.appendChild(coordEl);
          }
          if (attribution) {
            const attrEl = document.createElement("span");
            attrEl.innerHTML = attribution;
            attrEl.className = "tile-attribution";
            footer.appendChild(attrEl);
          }
          div.appendChild(footer);
        }
        return div;
      }

      async function fetchPages(url) {
        const response = await fetch(url);
        if (!response.ok) {
          const body = await response.json().catch(() => ({}));
          throw new Error(
            body.error || `Pages request failed: ${response.status}`,
          );
        }
        const { pages } = await response.json();
        return pages.map((tile) => ({
          src: tile.url,
          coord: `(${tile.col},${tile.row})`,
        }));
      }

      async function loadPreview() {
        try {
          const url = buildMapUrl();
          errorBox.textContent = "";
          const tiles = pagesModeCheckbox.checked
            ? await fetchPages(url)
            : [{ src: url, coord: null }];
          resetPreview();
          const divs = await Promise.all(
            tiles.map((t) => renderTile(t.src, t.coord)),
          );
          for (const div of divs) previewGrid.appendChild(div);
          previewSection.classList.remove("dirty");
        } catch (e) {
          errorBox.textContent = e.message || "Invalid input.";
        }
      }

      // event wiring

      previewButton.addEventListener("click", () => loadPreview());

      document
        .getElementById("reset")
        .addEventListener("click", () => (location.href = location.pathname));

      form.addEventListener("input", () => update());

      addTextButton.addEventListener("click", () => appendItem("text"));
      addGeoButton.addEventListener("click", () =>
        appendItem("geojson", { value: defaultLine }),
      );
      addPointButton.addEventListener("click", () => {
        appendItem("text", { value: "label:Point Label" });
        appendItem("geojson", { value: defaultPoint });
      });

      // init

      const restoredFromHash = loadFromHash();
      if (!restoredFromHash) {
        appendItem("text", { value: defaultTextCommand });
        appendItem("geojson", { value: defaultLine });
        appendItem("text", { value: "label:Midpoint" });
        appendItem("geojson", { value: defaultPoint });
      }
      refresh();
    </script>
  </body>
</html>
