<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Staticmap Playground</title>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7.3/turf.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f2ea;
        --panel: #ffffff;
        --ink: #1f1f1f;
        --muted: #6b6b6b;
        --accent: #2367f1;
        --accent-2: #f26d5b;
        --border: #e4ddd2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at top left,
            rgba(35, 103, 241, 0.12),
            transparent 45%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(242, 109, 91, 0.12),
            transparent 45%
          ),
          var(--bg);
      }

      header {
        padding: 32px 24px 12px;
        max-width: 1100px;
        margin: 0 auto;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        letter-spacing: -0.02em;
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
      }

      main {
        max-width: 1100px;
        margin: 0 auto 48px;
        padding: 0 24px;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 24px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
      }

      .panel h2 {
        margin: 0 0 16px;
        font-size: 18px;
      }

      label {
        display: block;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 8px;
      }

      input,
      textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 12px 14px;
        font-size: 14px;
        font-family: "Space Grotesk", sans-serif;
        background: #fcfbf9;
      }

      textarea {
        min-height: 180px;
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: 160px minmax(0, 1fr);
        gap: 16px;
        margin-bottom: 16px;
      }

      .row.full {
        grid-template-columns: minmax(0, 1fr);
      }

      .list {
        display: grid;
        gap: 12px;
        margin-bottom: 16px;
      }

      .list-item {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: #fcfbf9;
      }

      .list-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: #f1ede4;
        font-size: 12px;
        font-weight: 600;
      }

      .item-actions {
        display: flex;
        gap: 8px;
      }

      .small {
        padding: 6px 12px;
        font-size: 12px;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 12px 20px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        background: var(--accent);
        color: white;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }

      button.secondary {
        background: #f1ede4;
        color: var(--ink);
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(35, 103, 241, 0.25);
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .url-box {
        margin-top: 16px;
        padding: 12px 14px;
        background: #f4f1ea;
        border-radius: 10px;
        font-size: 13px;
        word-break: break-all;
        color: #3c3c3c;
      }

      .preview {
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .preview img {
        display: block;
      }

      .attribution {
        font-size: 11px;
        color: var(--muted);
        margin-top: 6px;
      }

      .pages-grid {
        display: inline-grid;
        gap: 25px;
      }

      .pages-grid img {
        display: block;
      }

      .error {
        color: #c0392b;
        font-weight: 600;
        margin-top: 12px;
      }

      @media (max-width: 900px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Staticmap Playground</h1>
      <p>
        Paste GeoJSON, stack command segments, and preview static map output.
      </p>
    </header>
    <main>
      <section class="panel">
        <h2>Inputs</h2>
        <div class="row">
          <div>
            <label for="source">Source Key</label>
            <input id="source" value="osm" />
          </div>
          <div>
            <label>Command Items</label>
            <div class="actions">
              <button id="add-text" class="secondary small" type="button">
                Add text command
              </button>
              <button id="add-geojson" class="secondary small" type="button">
                Add line
              </button>
              <button id="add-point" class="secondary small" type="button">
                Add point
              </button>
            </div>
          </div>
        </div>
        <div class="list" id="command-list"></div>
        <div class="actions">
          <button id="preview">Preview</button>
          <button id="copy" class="secondary">Copy URL</button>
          <label
            style="
              display: inline-flex;
              align-items: center;
              gap: 6px;
              font-size: 14px;
              text-transform: none;
              letter-spacing: 0;
              color: var(--ink);
              margin: 0;
            "
          >
            <input
              type="checkbox"
              id="pages-mode"
              style="width: auto; border: none; padding: 0; background: none"
            />
            Pages
          </label>
        </div>
        <div id="url" class="url-box"></div>
        <div id="error" class="error"></div>
      </section>
      <section class="panel preview">
        <h2>Preview</h2>
        <div id="single-preview">
          <div class="image-wrap">
            <img id="image" alt="Rendered map preview" />
          </div>
          <div id="attribution" class="attribution"></div>
        </div>
        <div id="pages-preview" style="display: none">
          <div id="pages-grid" class="pages-grid"></div>
        </div>
      </section>
    </main>
    <script>
      const sourceInput = document.getElementById("source");
      const commandList = document.getElementById("command-list");
      const urlBox = document.getElementById("url");
      const errorBox = document.getElementById("error");
      const image = document.getElementById("image");
      const attributionBox = document.getElementById("attribution");
      const previewButton = document.getElementById("preview");
      const copyButton = document.getElementById("copy");
      const addTextButton = document.getElementById("add-text");
      const addGeoButton = document.getElementById("add-geojson");
      const addPointButton = document.getElementById("add-point");
      const pagesModeCheckbox = document.getElementById("pages-mode");
      const singlePreview = document.getElementById("single-preview");
      const pagesPreview = document.getElementById("pages-preview");
      const pagesGrid = document.getElementById("pages-grid");

      const items = [];
      const defaultTextCommand =
        "size:600x300/padding:16/color:#0000ff/width:10/border:#ffffff/borderWidth:6";
      const defaultGeoJson = `{
      "type": "Feature",
      "properties": {},
      "geometry": {
        "coordinates": [ [ -3.7433013435256157, 57.135747155226284 ], [ -3.7428251624946256, 57.13553009869429 ], [ -3.742377552324996, 57.13515283074193 ], [ -3.7421775562913524, 57.1347910633404 ], [ -3.742139461808705, 57.13463085093284 ], [ -3.7420251783615583, 57.1345274877215 ], [ -3.7420251783615583, 57.13440345148638 ], [ -3.741891847672747, 57.134315592235595 ], [ -3.741844229568869, 57.13419672350514 ], [ -3.741548997329801, 57.133995162611285 ], [ -3.7414251902614524, 57.133762590986066 ], [ -3.74131090681351, 57.13372124476621 ], [ -3.7409680564713312, 57.133338790044434 ], [ -3.740006170787325, 57.132635889981714 ], [ -3.738265068930218, 57.13165230872292 ], [ -3.7369984273858563, 57.13088218390206 ], [ -3.7360328738209603, 57.13046978611055 ], [ -3.735385267617687, 57.13032506126754 ], [ -3.734699566932619, 57.12993223384194 ], [ -3.7338152022292377, 57.12940505467637 ], [ -3.733053312578818, 57.128603869152585 ], [ -3.7325866551675517, 57.12789571009492 ], [ -3.7320819032743486, 57.12762174711773 ], [ -3.7320533324121925, 57.12748734944478 ], [ -3.7308416986584234, 57.12677916337299 ], [ -3.7300226672844587, 57.12631909730743 ], [ -3.7297741829084714, 57.12599871056881 ], [ -3.7291391443701514, 57.125860832419846 ], [ -3.727763227537366, 57.12499908235725 ] ],
        "type": "LineString"
      }
    }`;

      function encodePolyline(coords, precision) {
        let lastLat = 0;
        let lastLng = 0;
        const factor = Math.pow(10, precision || 5);
        let result = "";

        for (const [lng, lat] of coords) {
          const ilat = Math.round(lat * factor);
          const ilng = Math.round(lng * factor);
          result += encodeSigned(ilat - lastLat);
          result += encodeSigned(ilng - lastLng);
          lastLat = ilat;
          lastLng = ilng;
        }

        return result;
      }

      function encodeSigned(value) {
        let sgnNum = value << 1;
        if (value < 0) {
          sgnNum = ~sgnNum;
        }
        return encodeUnsigned(sgnNum);
      }

      function encodeUnsigned(value) {
        let encoded = "";
        while (value >= 0x20) {
          encoded += String.fromCharCode((0x20 | (value & 0x1f)) + 63);
          value >>= 5;
        }
        encoded += String.fromCharCode(value + 63);
        return encoded;
      }

      function extractLines(geojson) {
        if (!geojson) return [];

        // Raw coordinate array: [[lng, lat], ...]
        if (
          Array.isArray(geojson) &&
          geojson.length > 0 &&
          Array.isArray(geojson[0])
        ) {
          return [geojson];
        }

        if (!geojson.type) return [];

        if (geojson.type === "LineString") {
          return [geojson.coordinates];
        }

        if (geojson.type === "MultiLineString") {
          return geojson.coordinates || [];
        }

        if (geojson.type === "Feature") {
          return extractLines(geojson.geometry || {});
        }

        if (geojson.type === "FeatureCollection") {
          return geojson.features.flatMap((feature) =>
            extractLines(feature.geometry || {}),
          );
        }

        return [];
      }

      function renderItems() {
        commandList.innerHTML = "";

        items.forEach((item, index) => {
          const wrapper = document.createElement("div");
          wrapper.className = "list-item";

          const header = document.createElement("div");
          header.className = "list-header";

          const pill = document.createElement("span");
          pill.className = "pill";
          pill.textContent =
            item.type === "text"
              ? "Text commands"
              : item.type === "point"
                ? "Point"
                : "Line";

          const actions = document.createElement("div");
          actions.className = "item-actions";

          const removeButton = document.createElement("button");
          removeButton.className = "secondary small";
          removeButton.type = "button";
          removeButton.textContent = "Remove";
          removeButton.addEventListener("click", () => {
            items.splice(index, 1);
            renderItems();
            updateUrl();
          });

          actions.appendChild(removeButton);
          header.appendChild(pill);
          header.appendChild(actions);
          wrapper.appendChild(header);

          if (item.type === "text") {
            const input = document.createElement("input");
            input.value = item.value;
            input.placeholder = "color:#ffffff/width:6";
            input.addEventListener("input", (event) => {
              item.value = event.target.value;
            });
            wrapper.appendChild(input);
          } else if (item.type === "point") {
            const grid = document.createElement("div");
            grid.style.cssText =
              "display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px";

            function makePointField(labelText, placeholder, getValue, setValue) {
              const wrap = document.createElement("div");
              const lbl = document.createElement("label");
              lbl.textContent = labelText;
              lbl.style.cssText =
                "display:block;text-transform:uppercase;letter-spacing:0.08em;font-size:11px;color:var(--muted);margin-bottom:4px";
              const inp = document.createElement("input");
              inp.value = getValue();
              inp.placeholder = placeholder;
              inp.style.cssText = "padding:6px 10px;font-size:13px";
              inp.addEventListener("input", (e) => {
                setValue(e.target.value);
                updateUrl();
              });
              wrap.appendChild(lbl);
              wrap.appendChild(inp);
              return wrap;
            }

            grid.appendChild(
              makePointField(
                "Lng",
                "-122.4",
                () => item.lng,
                (v) => (item.lng = v),
              ),
            );
            grid.appendChild(
              makePointField(
                "Lat",
                "37.77",
                () => item.lat,
                (v) => (item.lat = v),
              ),
            );
            grid.appendChild(
              makePointField(
                "Label",
                "A",
                () => item.label,
                (v) => (item.label = v),
              ),
            );
            wrapper.appendChild(grid);
          } else {
            const geoHeader = document.createElement("div");
            geoHeader.style.cssText =
              "display:flex;justify-content:space-between;align-items:center;margin-bottom:6px";

            const label = document.createElement("label");
            label.textContent = "GeoJSON";
            label.style.margin = "0";
            geoHeader.appendChild(label);

            const precisionWrap = document.createElement("div");
            precisionWrap.style.cssText =
              "display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)";

            const precisionLabel = document.createElement("label");
            precisionLabel.textContent = "Precision";
            precisionLabel.style.cssText =
              "margin:0;text-transform:uppercase;letter-spacing:0.08em;font-size:11px";

            const precisionInput = document.createElement("input");
            precisionInput.type = "number";
            precisionInput.min = "1";
            precisionInput.max = "8";
            precisionInput.step = "1";
            precisionInput.value = item.precision ?? 5;
            precisionInput.style.cssText =
              "width:56px;padding:4px 8px;font-size:13px";
            precisionInput.addEventListener("input", (event) => {
              const v = parseInt(event.target.value, 10);
              if (Number.isFinite(v) && v >= 1 && v <= 8) {
                item.precision = v;
              }
            });

            precisionWrap.appendChild(precisionLabel);
            precisionWrap.appendChild(precisionInput);

            const simplifyLabel = document.createElement("label");
            simplifyLabel.textContent = "Simplify";
            simplifyLabel.style.cssText =
              "margin:0;text-transform:uppercase;letter-spacing:0.08em;font-size:11px";

            const simplifyInput = document.createElement("input");
            simplifyInput.type = "number";
            simplifyInput.min = "0";
            simplifyInput.step = "any";
            simplifyInput.placeholder = "off";
            simplifyInput.value = item.tolerance ?? "";
            simplifyInput.style.cssText =
              "width:72px;padding:4px 8px;font-size:13px";
            simplifyInput.addEventListener("input", (event) => {
              const v = parseFloat(event.target.value);
              item.tolerance = Number.isFinite(v) && v > 0 ? v : null;
            });

            precisionWrap.appendChild(simplifyLabel);
            precisionWrap.appendChild(simplifyInput);
            geoHeader.appendChild(precisionWrap);
            wrapper.appendChild(geoHeader);

            const textarea = document.createElement("textarea");
            textarea.spellcheck = false;
            textarea.value = item.value;
            textarea.placeholder = '{"type":"Feature","geometry":{"type":"LineString","coordinates":[[-122.5,37.7],[-122.4,37.8]]},"properties":{}}';
            textarea.addEventListener("input", (event) => {
              item.value = event.target.value;
            });
            wrapper.appendChild(textarea);
          }

          commandList.appendChild(wrapper);
        });
      }

      function addTextCommand(value) {
        items.push({ type: "text", value });
        renderItems();
        updateUrl();
      }

      function addGeoJson(value) {
        items.push({ type: "geojson", value, precision: 5, tolerance: null });
        renderItems();
        updateUrl();
      }

      function addPoint() {
        items.push({ type: "point", lng: "", lat: "", label: "" });
        renderItems();
        updateUrl();
      }

      function buildUrl() {
        errorBox.textContent = "";

        const source = sourceInput.value.trim();
        if (!source) {
          throw new Error("Source key is required.");
        }

        const segments = [`map:${source}`];

        if (items.length === 0) {
          throw new Error("Add at least one command item.");
        }

        for (const item of items) {
          if (item.type === "text") {
            const value = item.value.trim();
            if (!value) {
              continue;
            }
            segments.push(
              ...value
                .replace(/\#/g, "%23")
                .split("/")
                .map((part) => part.trim())
                .filter(Boolean),
            );
          } else if (item.type === "point") {
            const lng = parseFloat(item.lng);
            const lat = parseFloat(item.lat);
            if (!Number.isFinite(lng) || !Number.isFinite(lat)) {
              throw new Error("Point requires valid lng and lat.");
            }
            if (item.label && item.label.trim()) {
              segments.push(`label:${encodeURIComponent(item.label.trim())}`);
            }
            segments.push(`point:${lng},${lat}`);
          } else {
            const geojsonRaw = item.value.trim();
            if (!geojsonRaw) {
              throw new Error("GeoJSON item cannot be empty.");
            }

            let geojson;
            try {
              geojson = JSON.parse(geojsonRaw);
            } catch (error) {
              throw new Error("GeoJSON must be valid JSON.");
            }

            if (item.tolerance) {
              geojson = turf.simplify(geojson, {
                tolerance: item.tolerance,
                highQuality: false,
              });
            }

            const lines = extractLines(geojson);
            if (lines.length === 0) {
              throw new Error("GeoJSON must include a LineString.");
            }

            const precision = item.precision ?? 5;
            for (const coords of lines) {
              const encoded = encodePolyline(coords, precision);
              const precisionPrefix = precision !== 5 ? `${precision}:` : "";
              segments.push(
                `line:${precisionPrefix}${encodeURIComponent(encoded)}`,
              );
            }
          }
        }

        const mapPath = `/${segments.join("/")}`;
        return pagesModeCheckbox.checked ? `/pages${mapPath}` : mapPath;
      }

      let currentObjectUrl = null;

      async function loadPreview(url) {
        image.src = "";

        const response = await fetch(url);
        const blob = await response.blob();
        const attribution = response.headers.get("X-Map-Attribution");

        if (currentObjectUrl) {
          URL.revokeObjectURL(currentObjectUrl);
        }

        currentObjectUrl = URL.createObjectURL(blob);
        image.onload = () => {
          image.style.width = image.naturalWidth / 2 + "px";
          image.style.height = image.naturalHeight / 2 + "px";
        };
        image.src = currentObjectUrl;

        attributionBox.innerHTML = attribution ?? "";
      }

      async function loadPagesPreview(mapPath) {
        const response = await fetch(mapPath);
        if (!response.ok) {
          const body = await response.json().catch(() => ({}));
          throw new Error(
            body.error || `Pages request failed: ${response.status}`,
          );
        }
        const { pages } = await response.json();

        pagesGrid.style.gridTemplateColumns = "auto";
        pagesGrid.innerHTML = "";

        for (const tile of pages) {
          const img = document.createElement("img");
          img.alt = `Page row ${tile.row} col ${tile.col}`;
          img.onload = () => {
            img.style.width = img.naturalWidth / 2 + "px";
            img.style.height = img.naturalHeight / 2 + "px";
          };
          img.src = tile.url;
          pagesGrid.appendChild(img);
        }
      }

      function updateUrl() {
        try {
          const url = buildUrl();
          urlBox.textContent = url;
          errorBox.textContent = "";
        } catch (error) {
          urlBox.textContent = "";
          errorBox.textContent = error.message || "Invalid input.";
        }
      }

      async function renderImage() {
        try {
          const url = buildUrl();
          urlBox.textContent = url;
          errorBox.textContent = "";
          if (pagesModeCheckbox.checked) {
            singlePreview.style.display = "none";
            pagesPreview.style.display = "";
            await loadPagesPreview(url);
          } else {
            pagesPreview.style.display = "none";
            singlePreview.style.display = "";
            await loadPreview(url);
          }
        } catch (error) {
          errorBox.textContent = error.message || "Invalid input.";
        }
      }

      previewButton.addEventListener("click", () => renderImage());
      copyButton.addEventListener("click", async () => {
        try {
          const url = buildUrl();
          await navigator.clipboard.writeText(url);
          urlBox.textContent = url;
        } catch (error) {
          errorBox.textContent = error.message || "Copy failed.";
        }
      });

      function onInputChange() {
        updateUrl();
      }

      sourceInput.addEventListener("input", onInputChange);
      commandList.addEventListener("input", onInputChange);
      pagesModeCheckbox.addEventListener("change", onInputChange);

      addTextButton.addEventListener("click", () => addTextCommand(""));
      addGeoButton.addEventListener("click", () => addGeoJson(""));
      addPointButton.addEventListener("click", () => addPoint());

      addTextCommand(defaultTextCommand);
      addGeoJson(defaultGeoJson);

      updateUrl();
    </script>
  </body>
</html>
